services:
  backend:
    build:
      context: ./backend/BookAudit.Api
      dockerfile: Dockerfile
    ports:
      - "5132:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/bookaudit.db
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend/book-audit-client
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend-data: